<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#f7931e"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Music Note Icon -->
  <circle cx="200" cy="315" r="120" fill="url(#accent)" opacity="0.2"/>
  <text x="200" y="370" font-family="Arial, sans-serif" font-size="150" fill="#fff" text-anchor="middle">♫</text>
  
  <!-- Title -->
  <text x="500" y="250" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#fff">BlazingMusic</text>
  
  <!-- Subtitle -->
  <text x="500" y="330" font-family="Arial, sans-serif" font-size="36" fill="#ff6b35">Android Music Player</text>
  
  <!-- Version -->
  <text x="500" y="400" font-family="Arial, sans-serif" font-size="28" fill="#888">v1.0.0</text>
  
  <!-- Features -->
  <text x="500" y="480" font-family="Arial, sans-serif" font-size="22" fill="#aaa">Kotlin • Media3 • Material Design</text>
  
  <!-- Flame Icon -->
  <text x="1050" y="150" font-size="80" fill="#ff6b35">🔥</text>
</svg>
